<!DOCTYPE html>
<html lang="{{ .Language.Lang }}" dir="{{ if eq .Language.Lang "ar" }}rtl{{ else }}ltr{{ end }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ block "title" . }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
  {{ with .Site.Params.analyticsURL }}
  <script async defer data-website-id="" src="{{ . }}"></script>
  {{ end }}
</head>
<body>
  <header class="site-header">
    <nav class="nav-main">
      <a class="nav-logo" href="{{ "/" | relLangURL }}">OSFL Balkans</a>
      <div class="nav-links">
        <a href="{{ "/modules/" | relLangURL }}">{{ i18n "nav_modules" }}</a>
        <a href="{{ "/tools/" | relLangURL }}">{{ i18n "nav_tools" }}</a>
        <a href="{{ "/facilitator/" | relLangURL }}">{{ i18n "nav_facilitator" }}</a>
      </div>
      {{ partial "lang-switcher.html" . }}
    </nav>
  </header>

  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <p>{{ i18n "footer_license" }} — <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a></p>
    <p>{{ i18n "footer_grant" }}</p>
  </footer>

  <script src="{{ "js/site.js" | relURL }}"></script>
</body>
</html>
