<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Structure Comparator — OSFL Balkans</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .question { margin-bottom: 20px; }
    .question p { font-weight: 600; margin-bottom: 8px; }
    .question label { display: block; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 6px; cursor: pointer; }
    .question label:hover { border-color: #005fa3; background: #f0f7ff; }
    .question input[type=radio]:checked + span { font-weight: 600; }
    .comparison-table { width: 100%; border-collapse: collapse; margin-top: 24px; font-size: 0.875rem; }
    .comparison-table th { background: #005fa3; color: #fff; padding: 10px 12px; text-align: left; }
    .comparison-table td { padding: 8px 12px; border: 1px solid #ddd; vertical-align: top; }
    .comparison-table tr:nth-child(even) td { background: #fafafa; }
    .recommended { background: #e8f5e9 !important; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-recommended { background: #1a7a4a; color: #fff; }
  </style>
</head>
<body>
<main id="main-content" style="max-width:760px;margin:40px auto;padding:0 20px">
  <a href="/" style="font-size:0.85rem;color:#555">← OSFL Balkans</a>
  <h1 style="margin-top:16px">Business Structure Comparator</h1>
  <p style="color:#555;margin-bottom:28px">Answer a few questions to compare legal business structures available in your country.</p>

  <div class="form-group">
    <label for="country">Country</label>
    <select id="country" onchange="loadCountry(this.value)">
      <option value="">— Select country —</option>
      <option value="HR">Croatia</option>
      <option value="RS">Serbia</option>
      <option value="BA">Bosnia & Herzegovina</option>
      <option value="ME">Montenegro</option>
      <option value="MK">North Macedonia</option>
      <option value="AL">Albania</option>
    </select>
  </div>

  <div id="questions" style="display:none">
    <div class="question">
      <p>What best describes your business?</p>
      <label><input type="radio" name="type" value="solo"> <span>I work alone (freelancer / sole trader)</span></label>
      <label><input type="radio" name="type" value="small"> <span>Small team (2–10 people)</span></label>
      <label><input type="radio" name="type" value="company"> <span>Formal company with investors or partners</span></label>
    </div>
    <div class="question">
      <p>Estimated annual revenue</p>
      <label><input type="radio" name="revenue" value="low"> <span>Under €20,000 / year</span></label>
      <label><input type="radio" name="revenue" value="mid"> <span>€20,000 – €100,000 / year</span></label>
      <label><input type="radio" name="revenue" value="high"> <span>Over €100,000 / year</span></label>
    </div>
    <div class="question">
      <p>How important is limiting personal liability?</p>
      <label><input type="radio" name="liability" value="low"> <span>Not important — I accept personal risk</span></label>
      <label><input type="radio" name="liability" value="high"> <span>Important — I want to protect personal assets</span></label>
    </div>
    <button class="btn-primary" onclick="compare()" style="margin-top:8px;width:100%">Compare structures</button>
  </div>

  <div id="result" style="display:none"></div>
</main>
<script src="comparator.js"></script>
</body>
</html>
