<VirtualHost *:80>
    ServerName osflbalkans.org
    ServerAlias www.osflbalkans.org
    DocumentRoot /var/www/osflbalkans

    <Directory /var/www/osflbalkans>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/osflbalkans-error.log
    CustomLog ${APACHE_LOG_DIR}/osflbalkans-access.log combined
</VirtualHost>
